name: Deploy Eleventy to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Toto zajistí, že se nebude tlouct více buildů najednou
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # --- TADY JE TA ZMĚNA ---
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # ------------------------
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Eleventy
        run: npx @11ty/eleventy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
